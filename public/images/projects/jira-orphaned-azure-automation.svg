<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0e2240"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Flow diagram -->
  <!-- Azure scan box -->
  <rect x="80" y="180" width="150" height="80" rx="10" fill="#0078D4" fill-opacity="0.2" stroke="#0078D4" stroke-width="1.5"/>
  <text x="155" y="212" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="10" font-weight="700">☁ AZURE</text>
  <text x="155" y="230" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">Resource Scanner</text>
  <text x="155" y="248" text-anchor="middle" fill="#a0c4ff" font-family="system-ui,sans-serif" font-size="9">Orphan Detection</text>
  <!-- Arrow 1 -->
  <line x1="230" y1="220" x2="290" y2="220" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="290,220 278,214 278,226" fill="#0078D4"/>
  <!-- Logic box -->
  <rect x="290" y="180" width="150" height="80" rx="10" fill="#1e3a5f" fill-opacity="0.8" stroke="#50b4ff" stroke-width="1.5"/>
  <text x="365" y="212" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="10" font-weight="700">⚙ AUTOMATION</text>
  <text x="365" y="230" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">Rule Engine</text>
  <text x="365" y="248" text-anchor="middle" fill="#a0c4ff" font-family="system-ui,sans-serif" font-size="9">Tag / Age / Usage</text>
  <!-- Arrow 2 -->
  <polygon points="460,220 448,214 448,226" fill="#0052CC"/>
  <line x1="440" y1="220" x2="500" y2="220" stroke="#0052CC" stroke-width="1.5"/>
  <!-- JIRA box -->
  <rect x="500" y="180" width="150" height="80" rx="10" fill="#0052CC" fill-opacity="0.25" stroke="#0052CC" stroke-width="1.5"/>
  <text x="575" y="212" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700">◈ JIRA</text>
  <text x="575" y="230" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">Ticket Creation</text>
  <text x="575" y="248" text-anchor="middle" fill="#a0c4ff" font-family="system-ui,sans-serif" font-size="9">Auto-assigned</text>
  <!-- Orphan resources bubbles -->
  <circle cx="130" cy="320" r="22" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="130" y="324" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="9" font-weight="600">Orphan</text>
  <circle cx="185" cy="340" r="18" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="185" y="344" text-anchor="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="8">Unused</text>
  <circle cx="230" cy="320" r="14" fill="#eab308" fill-opacity="0.2" stroke="#eab308" stroke-width="1"/>
  <text x="230" y="324" text-anchor="middle" fill="#fde047" font-family="system-ui,sans-serif" font-size="8">Stale</text>
  <!-- Azure badge -->
  <rect x="20" y="16" width="130" height="28" rx="6" fill="#0078D4" opacity="0.9"/>
  <text x="85" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">☁ AZURE</text>
  <!-- JIRA badge -->
  <rect x="650" y="16" width="130" height="28" rx="6" fill="#0052CC" opacity="0.9"/>
  <text x="715" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">◈ JIRA</text>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="17" font-weight="700">JIRA Orphaned Azure Resource Automation</text>
  <text x="400" y="454" text-anchor="middle" dominant-baseline="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="11">Auto-scan · Orphan Detection · JIRA Ticket Creation</text>
</svg>
