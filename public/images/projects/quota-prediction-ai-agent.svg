<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a1060"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#0078D4"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Neural network connections -->
  <g stroke="#7c3aed" stroke-width="0.8" opacity="0.25">
    <!-- Input to hidden -->
    <line x1="150" y1="160" x2="320" y2="180"/><line x1="150" y1="200" x2="320" y2="180"/>
    <line x1="150" y1="240" x2="320" y2="180"/><line x1="150" y1="280" x2="320" y2="240"/>
    <line x1="150" y1="160" x2="320" y2="240"/><line x1="150" y1="200" x2="320" y2="240"/>
    <line x1="150" y1="240" x2="320" y2="300"/><line x1="150" y1="280" x2="320" y2="300"/>
    <line x1="150" y1="320" x2="320" y2="300"/>
    <!-- Hidden to output -->
    <line x1="320" y1="180" x2="490" y2="200"/><line x1="320" y1="240" x2="490" y2="200"/>
    <line x1="320" y1="300" x2="490" y2="200"/><line x1="320" y1="180" x2="490" y2="280"/>
    <line x1="320" y1="240" x2="490" y2="280"/><line x1="320" y1="300" x2="490" y2="280"/>
    <!-- Output to prediction -->
    <line x1="490" y1="200" x2="640" y2="240"/><line x1="490" y1="280" x2="640" y2="240"/>
  </g>
  <!-- Input nodes -->
  <g fill="#0078D4">
    <circle cx="150" cy="160" r="10"/><circle cx="150" cy="200" r="10"/>
    <circle cx="150" cy="240" r="10"/><circle cx="150" cy="280" r="10"/>
    <circle cx="150" cy="320" r="10"/>
  </g>
  <!-- Hidden nodes -->
  <g fill="#7c3aed">
    <circle cx="320" cy="180" r="12"/><circle cx="320" cy="240" r="12"/><circle cx="320" cy="300" r="12"/>
  </g>
  <!-- Output nodes -->
  <g fill="url(#aiGrad)">
    <circle cx="490" cy="200" r="12"/><circle cx="490" cy="280" r="12"/>
  </g>
  <!-- Prediction -->
  <circle cx="640" cy="240" r="18" fill="none" stroke="#00e5ff" stroke-width="2"/>
  <circle cx="640" cy="240" r="10" fill="#00e5ff" opacity="0.8"/>
  <!-- Math prediction lines -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.3">
    <polyline points="660,240 700,180 720,200 740,160 760,120"/>
    <polyline points="660,240 700,230 720,220 740,210 760,200" stroke-dasharray="4,3"/>
  </g>
  <!-- Labels -->
  <text x="130" y="136" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="9">Metrics</text>
  <text x="640" y="290" text-anchor="middle" fill="#00e5ff" font-family="system-ui,sans-serif" font-size="9">Prediction</text>
  <!-- Azure OpenAI badge -->
  <rect x="20" y="16" width="160" height="28" rx="6" fill="url(#aiGrad)" opacity="0.9"/>
  <text x="100" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">✦ AZURE OPENAI</text>
  <!-- Math badge -->
  <rect x="620" y="16" width="160" height="28" rx="6" fill="#7c3aed" opacity="0.85"/>
  <text x="700" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">∫ MATHEMATICAL</text>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="17" font-weight="700">Quota Prediction AI Agent</text>
  <text x="400" y="454" text-anchor="middle" dominant-baseline="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="11">Hybrid Math Predictions · LLM Agentic Experience · Azure</text>
</svg>
