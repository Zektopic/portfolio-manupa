<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f00"/>
      <stop offset="100%" style="stop-color:#2d1500"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Prometheus flame icon (simplified) -->
  <g transform="translate(370,50)" opacity="0.2">
    <path d="M30,90 C10,70 5,50 20,30 C15,50 30,55 25,40 C35,55 45,50 40,30 C55,50 50,70 30,90Z" fill="#E6522C"/>
  </g>
  <!-- Metrics visualization -->
  <g>
    <!-- Bars chart -->
    <rect x="120" y="300" width="30" height="80" fill="#E6522C" opacity="0.7" rx="3"/>
    <rect x="160" y="260" width="30" height="120" fill="#E6522C" opacity="0.7" rx="3"/>
    <rect x="200" y="220" width="30" height="160" fill="#E6522C" opacity="0.8" rx="3"/>
    <rect x="240" y="250" width="30" height="130" fill="#E6522C" opacity="0.7" rx="3"/>
    <rect x="280" y="230" width="30" height="150" fill="#E6522C" opacity="0.6" rx="3"/>
    <!-- Line chart -->
    <polyline points="350,280 390,240 430,260 470,200 510,220 550,180 590,200 630,170" fill="none" stroke="#E6522C" stroke-width="2.5" opacity="0.8"/>
    <g fill="#E6522C" opacity="0.9">
      <circle cx="350" cy="280" r="4"/><circle cx="390" cy="240" r="4"/>
      <circle cx="430" cy="260" r="4"/><circle cx="470" cy="200" r="4"/>
      <circle cx="510" cy="220" r="4"/><circle cx="550" cy="180" r="4"/>
      <circle cx="590" cy="200" r="4"/><circle cx="630" cy="170" r="4"/>
    </g>
    <!-- X-axis -->
    <line x1="100" y1="385" x2="700" y2="385" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  </g>
  <!-- Exporter boxes -->
  <rect x="100" y="120" width="110" height="48" rx="6" fill="#E6522C" fill-opacity="0.15" stroke="#E6522C" stroke-width="1"/>
  <text x="155" y="148" text-anchor="middle" dominant-baseline="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="10">AKS Exporter</text>
  <rect x="230" y="120" width="110" height="48" rx="6" fill="#E6522C" fill-opacity="0.15" stroke="#E6522C" stroke-width="1"/>
  <text x="285" y="148" text-anchor="middle" dominant-baseline="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="10">Node Exporter</text>
  <rect x="360" y="120" width="110" height="48" rx="6" fill="#E6522C" fill-opacity="0.15" stroke="#E6522C" stroke-width="1"/>
  <text x="415" y="148" text-anchor="middle" dominant-baseline="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="10">Azure Metrics</text>
  <rect x="490" y="120" width="110" height="48" rx="6" fill="#E6522C" fill-opacity="0.15" stroke="#E6522C" stroke-width="1"/>
  <text x="545" y="148" text-anchor="middle" dominant-baseline="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="10">Custom Exporters</text>
  <!-- Prometheus badge -->
  <rect x="20" y="16" width="160" height="28" rx="6" fill="#E6522C" opacity="0.9"/>
  <text x="100" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">🔥 PROMETHEUS</text>
  <!-- Kubernetes badge -->
  <rect x="620" y="16" width="160" height="28" rx="6" fill="#326CE5" opacity="0.9"/>
  <text x="700" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">⎈  KUBERNETES</text>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="17" font-weight="700">Unified Prometheus Exporters Repo</text>
  <text x="400" y="454" text-anchor="middle" dominant-baseline="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="11">Cloud Platform Specific · AKS · Azure · Custom Metrics</text>
</svg>
