<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#1a3a4a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Performance graph lines -->
  <g stroke="#00d4ff" stroke-width="1.5" opacity="0.2" fill="none">
    <polyline points="80,340 160,280 240,300 320,200 400,180 480,160 560,140 640,120 720,100"/>
    <polyline points="80,380 160,360 240,340 320,300 400,260 480,240 560,200 640,180 720,150"/>
  </g>
  <!-- Kubernetes hexagons -->
  <g fill="none" stroke="#326CE5" stroke-width="1.5" opacity="0.5">
    <polygon points="200,160 230,143 260,160 260,193 230,210 200,193"/>
    <polygon points="300,220 330,203 360,220 360,253 330,270 300,253"/>
    <polygon points="420,160 450,143 480,160 480,193 450,210 420,193"/>
    <polygon points="520,220 550,203 580,220 580,253 550,270 520,253"/>
  </g>
  <g fill="#326CE5" opacity="0.8">
    <circle cx="230" cy="176" r="4"/><circle cx="330" cy="236" r="4"/>
    <circle cx="450" cy="176" r="4"/><circle cx="550" cy="236" r="4"/>
  </g>
  <!-- Connecting lines between nodes -->
  <g stroke="#326CE5" stroke-width="1" opacity="0.4">
    <line x1="260" y1="176" x2="300" y2="236"/><line x1="360" y1="236" x2="420" y2="176"/>
    <line x1="480" y1="176" x2="520" y2="236"/>
  </g>
  <!-- Kubernetes badge -->
  <rect x="20" y="16" width="140" height="28" rx="6" fill="#326CE5" opacity="0.9"/>
  <text x="90" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">⎈  KUBERNETES</text>
  <!-- Optimized badge -->
  <rect x="640" y="16" width="140" height="28" rx="6" fill="#00c853" opacity="0.85"/>
  <text x="710" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">▲ OPTIMIZED</text>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="17" font-weight="700">K8s Network Optimization DaemonSet</text>
  <text x="400" y="454" text-anchor="middle" dominant-baseline="middle" fill="#00d4ff" font-family="system-ui,sans-serif" font-size="11">Production-Grade Cluster · Network Performance · Large Scale</text>
</svg>
