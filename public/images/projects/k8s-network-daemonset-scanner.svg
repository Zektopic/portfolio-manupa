<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3c"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Spider web lines -->
  <g stroke="#326CE5" stroke-width="0.8" opacity="0.3">
    <line x1="400" y1="240" x2="200" y2="120"/><line x1="400" y1="240" x2="600" y2="120"/>
    <line x1="400" y1="240" x2="650" y2="280"/><line x1="400" y1="240" x2="550" y2="380"/>
    <line x1="400" y1="240" x2="250" y2="380"/><line x1="400" y1="240" x2="150" y2="280"/>
    <!-- Rings -->
    <circle cx="400" cy="240" r="60" fill="none"/><circle cx="400" cy="240" r="120" fill="none"/>
    <circle cx="400" cy="240" r="180" fill="none"/>
    <!-- Cross connections -->
    <line x1="200" y1="120" x2="600" y2="120"/><line x1="600" y1="120" x2="650" y2="280"/>
    <line x1="650" y1="280" x2="550" y2="380"/><line x1="550" y1="380" x2="250" y2="380"/>
    <line x1="250" y1="380" x2="150" y2="280"/><line x1="150" y1="280" x2="200" y2="120"/>
  </g>
  <!-- Node circles -->
  <circle cx="400" cy="240" r="14" fill="#326CE5"/>
  <circle cx="200" cy="120" r="10" fill="#326CE5" opacity="0.8"/>
  <circle cx="600" cy="120" r="10" fill="#326CE5" opacity="0.8"/>
  <circle cx="650" cy="280" r="10" fill="#326CE5" opacity="0.8"/>
  <circle cx="550" cy="380" r="10" fill="#326CE5" opacity="0.8"/>
  <circle cx="250" cy="380" r="10" fill="#326CE5" opacity="0.8"/>
  <circle cx="150" cy="280" r="10" fill="#326CE5" opacity="0.8"/>
  <!-- Kubernetes badge -->
  <rect x="20" y="16" width="140" height="28" rx="6" fill="#326CE5" opacity="0.9"/>
  <text x="90" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">⎈  KUBERNETES</text>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="17" font-weight="700">K8s Network DaemonSet Scanner</text>
  <text x="400" y="454" text-anchor="middle" dominant-baseline="middle" fill="#326CE5" font-family="system-ui,sans-serif" font-size="11">Spidermap · Service Health · Connection Debugging</text>
</svg>
