<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e"/>
      <stop offset="100%" style="stop-color:#2d1a5c"/>
    </linearGradient>
    <linearGradient id="tfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#844FBA"/>
      <stop offset="100%" style="stop-color:#5C2D91"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Terraform logo (diamond shape simplified) -->
  <g transform="translate(340,40)" opacity="0.25">
    <polygon points="60,0 120,34 120,103 60,137 0,103 0,34" fill="#844FBA"/>
    <polygon points="60,20 100,43 100,90 60,113 20,90 20,43" fill="#5C2D91"/>
    <text x="60" y="73" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="22" font-weight="900">TF</text>
  </g>
  <!-- IaC pipeline boxes -->
  <!-- Code box -->
  <rect x="80" y="200" width="130" height="80" rx="10" fill="#844FBA" fill-opacity="0.2" stroke="#844FBA" stroke-width="1.5"/>
  <text x="145" y="232" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700">📄 .TF FILES</text>
  <text x="145" y="250" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">IaC Code</text>
  <text x="145" y="267" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="9">HCL / Terraform</text>
  <!-- Arrow -->
  <polygon points="240,240 228,234 228,246" fill="#844FBA"/>
  <line x1="210" y1="240" x2="250" y2="240" stroke="#844FBA" stroke-width="1.5"/>
  <!-- TFC box -->
  <rect x="250" y="200" width="130" height="80" rx="10" fill="#5C2D91" fill-opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="315" y="232" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700">☁ TFC</text>
  <text x="315" y="250" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">Terraform Cloud</text>
  <text x="315" y="267" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="9">Plan · Apply · State</text>
  <!-- Arrow -->
  <polygon points="410,240 398,234 398,246" fill="#0078D4"/>
  <line x1="380" y1="240" x2="420" y2="240" stroke="#0078D4" stroke-width="1.5"/>
  <!-- Azure resources box -->
  <rect x="420" y="200" width="130" height="80" rx="10" fill="#0078D4" fill-opacity="0.2" stroke="#0078D4" stroke-width="1.5"/>
  <text x="485" y="232" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="10" font-weight="700">☁ AZURE</text>
  <text x="485" y="250" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">Resources</text>
  <text x="485" y="267" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="9">Provisioned</text>
  <!-- Arrow -->
  <polygon points="580,240 568,234 568,246" fill="#00c853"/>
  <line x1="550" y1="240" x2="590" y2="240" stroke="#00c853" stroke-width="1.5"/>
  <!-- Migrated box -->
  <rect x="590" y="200" width="130" height="80" rx="10" fill="#00c853" fill-opacity="0.15" stroke="#00c853" stroke-width="1.5"/>
  <text x="655" y="232" text-anchor="middle" fill="#86efac" font-family="system-ui,sans-serif" font-size="10" font-weight="700">✓ MIGRATED</text>
  <text x="655" y="250" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11">Manual → IaC</text>
  <text x="655" y="267" text-anchor="middle" fill="#86efac" font-family="system-ui,sans-serif" font-size="9">State Managed</text>
  <!-- Resource labels -->
  <text x="400" y="340" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="10">Subscriptions  ·  Service Principals  ·  Key Vaults  ·  RBAC  ·  VNets</text>
  <!-- Terraform badge -->
  <rect x="20" y="16" width="150" height="28" rx="6" fill="url(#tfGrad)" opacity="0.9"/>
  <text x="95" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">◆ TERRAFORM</text>
  <!-- Azure badge -->
  <rect x="630" y="16" width="150" height="28" rx="6" fill="#0078D4" opacity="0.9"/>
  <text x="705" y="34" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="700">☁ AZURE</text>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="system-ui,sans-serif" font-size="17" font-weight="700">IaC with Terraform — Azure Infrastructure</text>
  <text x="400" y="454" text-anchor="middle" dominant-baseline="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="11">TF · TFC · Azure · Subscriptions · KeyVaults · Manual → IaC Migration</text>
</svg>
